<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <!-- This connects your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Study Dashboard</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Tasks</a>
            <a href="#">Progress</a>
        </nav>
    </header>

    <main>

        <section class="welcome">
            <h2>Welcome Back 👋</h2>
            <p>Track your study progress and tasks.</p>
        </section>

        <section class="cards">

            <div class="card">
                <h3>Study Hours</h3>
                <p>5 Hours</p>
            </div>

            <div class="card">
                <h3>Tasks Done</h3>
                <p>12 Tasks</p>
            </div>

            <div class="card">
                <h3>Streak</h3>
                <p>7 Days</p>
            </div>

        </section>

        <section class="tasks">
            <h2>Today's Tasks</h2>

            <ul>
                <li>Study Algorithms</li>
                <li>Practice C Programming</li>
                <li>Work on CSS project</li>
                <li>Review notes</li>
            </ul>
        </section>

    </main>

</body>
</html>
